<main
  class="min-h-[calc(100vh-72px)] w-full max-w-full min-w-0 overflow-x-hidden bg-[#f7f4ef] px-4 py-6 sm:min-h-[calc(100vh-88px)] sm:px-6 sm:py-7 lg:px-8">
  <section
    class="mb-6 flex w-full max-w-full min-w-0 flex-col gap-5 rounded-2xl border-0 px-0 py-5 sm:px-6 sm:py-6 lg:flex-row lg:items-center lg:justify-between">
    <div class="min-w-0">
      <h1 class="text-3xl font-extrabold text-[#1f2a1f]">{{ 'DASHBOARD.TITLE' | translate }}</h1>
      <p class="mt-2 text-base font-medium text-[#8d877e]">
        {{ 'DASHBOARD.SUBTITLE' | translate }}
      </p>
    </div>

    <div class="flex w-full min-w-0 flex-col gap-3 sm:flex-row sm:items-center lg:w-auto">
      <button type="button"
        class="flex h-11 w-full items-center justify-between gap-4 rounded-xl border border-[#e5ded2] bg-white px-4 text-sm font-semibold text-[#342f29] shadow-sm transition hover:bg-[#f7f4ef] sm:min-w-[170px] lg:w-auto"
        (click)="selectMonth()">
        <span>{{ 'DASHBOARD.MONTH' | translate }}</span>
        <i class="pi pi-chevron-down text-xs text-[#8d877e]"></i>
      </button>

      <app-export-report [config]="dashboardExportConfig"
        [buttonLabel]="'DASHBOARD.EXPORT_REPORT' | translate"></app-export-report>
    </div>
  </section>

  <section class="grid w-full max-w-full min-w-0 grid-cols-1 gap-6 sm:grid-cols-2 xl:grid-cols-4">
    @for (card of kpiCards; track card.title) {
    <app-kpi-card class="min-w-0" [data]="card"></app-kpi-card>
    }
  </section>

  <section class="mt-6 grid w-full max-w-full min-w-0 grid-cols-1 gap-6 2xl:grid-cols-3">
    <div class="min-w-0 2xl:col-span-2">
      <app-revenue-overview-chart></app-revenue-overview-chart>
    </div>
    <app-sales-category-chart class="min-w-0 2xl:col-span-1"></app-sales-category-chart>
  </section>

  <section class="mt-6 grid w-full max-w-full min-w-0 grid-cols-1 gap-6 2xl:grid-cols-3">
    <div class="min-w-0 2xl:col-span-2">
      <app-sales-orders-chart></app-sales-orders-chart>
    </div>
    <app-sales-performance-card class="min-w-0 2xl:col-span-1"></app-sales-performance-card>
  </section>

  <section class="mt-6 grid w-full max-w-full min-w-0 grid-cols-1 gap-6 2xl:grid-cols-3">
    <div class="min-w-0 2xl:col-span-2">
      <app-recent-orders-card></app-recent-orders-card>
    </div>
    <app-best-selling-products-card class="min-w-0 2xl:col-span-1"></app-best-selling-products-card>
  </section>
</main>
