<app-admin-form-modal
  [isOpen]="isOpen"
  [title]="title"
  size="lg"
  submitLabel="MEDIA_PICKER.SELECT"
  cancelLabel="MEDIA_PICKER.CANCEL"
  [loading]="loading()"
  (close)="close.emit()"
  (submit)="confirmSelection()">
  <section class="space-y-4">
    <div class="grid gap-3 lg:grid-cols-[minmax(0,1fr)_12rem]">
      <app-admin-form-field
        type="search"
        name="mediaPickerSearch"
        placeholder="MEDIA_PICKER.SEARCH_PLACEHOLDER"
        [value]="searchTerm()"
        (valueChange)="searchTerm.set($any($event))" />

      <app-admin-form-field
        type="select"
        name="mediaPickerCategory"
        [value]="category()"
        [options]="categoryOptions"
        optionLabel="label"
        optionValue="value"
        (valueChange)="category.set($any($event))" />
    </div>

    @if (error()) {
    <p class="rounded-2xl border border-[#f1b9b4] bg-[#fff1f0] px-4 py-3 text-sm font-bold text-[#b42318]">
      {{ error()! | translate }}
    </p>
    }

    @if (!loading() && filteredMedia().length === 0) {
    <div class="rounded-2xl border border-dashed border-[#d8d0c3] bg-[#fbfaf8] px-6 py-10 text-center">
      <span class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-[#eef4e8] text-2xl text-[#5f6f43]">
        <i class="pi pi-images"></i>
      </span>
      <h3 class="mt-4 text-lg font-black text-[#1f2a1f]">{{ 'MEDIA_PICKER.NO_MEDIA_TITLE' | translate }}</h3>
      <p class="mt-1 text-sm font-semibold text-[#8d877e]">{{ 'MEDIA_PICKER.NO_MEDIA_TEXT' | translate }}</p>
    </div>
    } @else {
    <div class="media-picker-grid max-h-[48vh] overflow-y-auto pr-1">
      @for (asset of filteredMedia(); track asset.id) {
      <button
        type="button"
        class="group min-w-0 overflow-hidden rounded-2xl border bg-white text-left shadow-sm transition hover:-translate-y-0.5 hover:shadow-md"
        [ngClass]="selectedId() === asset.id ? 'border-[#5f6f43] ring-4 ring-[#5f6f43]/10' : 'border-[#e5ded2]'"
        (click)="select(asset)">
        <span class="flex aspect-[4/3] w-full items-center justify-center overflow-hidden bg-[#f7f4ef]">
          @if (hasImage(asset)) {
          <img class="h-full w-full object-cover transition group-hover:scale-[1.02]" [src]="asset.file_url"
            [alt]="asset.alt_text || assetTitle(asset)" (error)="handleImageError(asset)" />
          } @else {
          <span class="flex h-16 w-16 items-center justify-center rounded-2xl bg-[#eef4e8] text-2xl text-[#5f6f43]">
            <i class="pi pi-image"></i>
          </span>
          }
        </span>

        <span class="block min-w-0 p-3">
          <span class="line-clamp-1 block text-sm font-black text-[#1f2a1f]">{{ assetTitle(asset) }}</span>
          <span class="mt-1 block truncate text-xs font-bold text-[#8d877e]">{{ assetMeta(asset) }}</span>
        </span>
      </button>
      }
    </div>
    }
  </section>
</app-admin-form-modal>
