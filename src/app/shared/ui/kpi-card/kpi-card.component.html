<article class="group flex h-[205px] flex-col rounded-2xl border border-[#e5ded2] bg-white p-6 shadow-sm transition duration-200 hover:shadow-[0_16px_36px_rgba(52,47,41,0.08)]">
  <div class="flex items-start justify-between gap-4">
    <span
      class="flex h-[52px] w-[52px] items-center justify-center rounded-2xl"
      [style.background]="data.iconBg"
      [style.color]="data.iconColor"
    >
      <i class="{{ data.icon }} text-xl"></i>
    </span>

    <span
      class="inline-flex items-center gap-1 rounded-full px-2.5 py-1 text-xs font-bold"
      [class.bg-[#eef4e8]]="data.trendType === 'up'"
      [class.bg-[#fff1f0]]="data.trendType === 'down'"
      [style.color]="data.trendColor"
    >
      <i class="pi text-[10px]" [class.pi-arrow-up]="data.trendType === 'up'" [class.pi-arrow-down]="data.trendType === 'down'"></i>
      {{ data.trend }}
    </span>
  </div>

  <div class="mt-6">
    <p class="text-3xl font-extrabold tracking-normal text-[#1f2a1f]">{{ data.value }}</p>
    <p class="mt-1 text-sm font-semibold text-[#8d877e]">{{ data.title }}</p>
  </div>

  <div class="mt-auto h-7 overflow-hidden">
    <highcharts-chart [options]="chartOptions" class="block h-7 w-full"></highcharts-chart>
  </div>
</article>
