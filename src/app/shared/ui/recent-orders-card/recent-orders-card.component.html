<article class="analytics-card overflow-hidden p-0">
  <div class="flex items-start justify-between gap-4 p-6">
    <div>
      <h2 class="text-xl font-bold text-[#1f2a1f]">Recent Orders</h2>
      <p class="mt-1 text-sm font-medium text-[#8d877e]">Latest 6 orders</p>
    </div>
    <button type="button" class="inline-flex h-11 items-center gap-2 rounded-2xl bg-[#eef4e8] px-5 text-sm font-bold text-[#5f6f43] transition hover:bg-[#e2ecd9]">
      View All
      <i class="pi pi-arrow-right text-xs"></i>
    </button>
  </div>

  <div class="w-full max-w-full min-w-0 overflow-x-auto">
    <table class="w-full min-w-[860px] text-left">
      <thead class="bg-[#fbfaf8] text-xs font-bold uppercase tracking-wide text-[#9a948b]">
        <tr>
          <th class="px-6 py-4">Order ID</th>
          <th class="px-6 py-4">Customer</th>
          <th class="px-6 py-4">Date</th>
          <th class="px-6 py-4">Total</th>
          <th class="px-6 py-4">Payment</th>
          <th class="px-6 py-4">Delivery</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-[#e5ded2]">
        @for (order of orders; track order.id) {
          <tr class="transition hover:bg-[#fbfaf8]">
            <td class="px-6 py-5 text-sm font-bold text-[#5f6f43]">{{ order.id }}</td>
            <td class="px-6 py-5">
              <p class="text-sm font-bold text-[#1f2a1f]">{{ order.customer }}</p>
              <p class="mt-1 text-sm font-medium text-[#8d877e]">{{ order.email }}</p>
            </td>
            <td class="px-6 py-5 text-sm font-medium text-[#667066]">{{ order.date }}</td>
            <td class="px-6 py-5 text-sm font-extrabold text-[#1f2a1f]">{{ order.total }}</td>
            <td class="px-6 py-5">
              <span [class]="'inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-bold ' + order.paymentClass">
                <span class="h-1.5 w-1.5 rounded-full bg-current"></span>
                {{ order.payment }}
              </span>
            </td>
            <td class="px-6 py-5">
              <span [class]="'inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-bold ' + order.deliveryClass">
                <span class="h-1.5 w-1.5 rounded-full bg-current"></span>
                {{ order.delivery }}
              </span>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</article>
