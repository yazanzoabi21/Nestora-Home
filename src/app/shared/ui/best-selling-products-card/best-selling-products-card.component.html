<article class="analytics-card">
  <div class="mb-7 flex items-start justify-between gap-4">
    <div>
      <h2 class="text-xl font-bold text-[#1f2a1f]">Best Selling Products</h2>
      <p class="mt-1 text-sm font-medium text-[#8d877e]">By units sold this month</p>
    </div>
    <button type="button" class="flex h-9 w-9 items-center justify-center rounded-full text-[#8d877e] transition hover:bg-[#f7f4ef]">
      <i class="pi pi-ellipsis-h"></i>
    </button>
  </div>

  <div class="space-y-6">
    @for (product of products; track product.rank) {
      <div class="grid grid-cols-[34px_minmax(0,1fr)_auto] items-start gap-4">
        <span
          class="flex h-8 w-8 items-center justify-center rounded-full text-sm font-bold"
          [class.bg-[#fff4df]]="product.rank === 1"
          [class.text-[#d97706]]="product.rank === 1"
          [class.bg-[#f1f0ee]]="product.rank !== 1"
          [class.text-[#8d877e]]="product.rank !== 1"
        >
          {{ product.rank }}
        </span>

        <div class="min-w-0">
          <p class="truncate text-base font-bold text-[#1f2a1f]">{{ product.name }}</p>
          <div class="mt-3 h-1.5 overflow-hidden rounded-full bg-[#f1eee8]">
            <div
              class="h-full rounded-full"
              [class.bg-[#5f6f43]]="product.rank === 1"
              [class.bg-[#d6c5b4]]="product.rank !== 1"
              [style.width.%]="product.progress"
            ></div>
          </div>
        </div>

        <div class="text-right">
          <p
            class="flex items-center justify-end gap-1 text-sm font-bold"
            [class.text-[#0f9f61]]="product.trendType === 'up'"
            [class.text-[#dc3f35]]="product.trendType === 'down'"
          >
            <i class="pi text-xs" [class.pi-arrow-up-right]="product.trendType === 'up'" [class.pi-arrow-down-right]="product.trendType === 'down'"></i>
            {{ product.trend }}
          </p>
          <p class="mt-3 text-sm font-medium text-[#8d877e]">{{ product.sold }}</p>
        </div>
      </div>
    }
  </div>
</article>
