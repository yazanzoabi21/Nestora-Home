<div #exportWrapper class="relative inline-block w-full sm:w-auto">
    <button type="button"
        class="flex h-11 w-full items-center justify-center gap-2 rounded-xl bg-[#5f6f43] px-6 text-sm font-bold text-white shadow-sm transition hover:bg-[#53613b] sm:w-auto"
        (click)="toggleMenu()">
        <i [class]="buttonIcon + ' text-sm'"></i>
        {{ buttonLabel }}
        <i class="pi pi-chevron-down text-xs transition" [class.rotate-180]="isOpen()"></i>
    </button>

    @if (isOpen()) {
    <div class="absolute right-0 top-full z-[9999] mt-2 w-48 rounded-xl border border-[#e5ded2] bg-white p-2 shadow-xl">
        <button type="button"
            class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold text-[#342f29] transition hover:bg-[#f7f4ef]"
            (click)="exportPdf()">
            <i class="pi pi-file-pdf text-base text-[#dc3f35]"></i>
            Export PDF
        </button>

        <button type="button"
            class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold text-[#342f29] transition hover:bg-[#f7f4ef]"
            (click)="exportExcel()">
            <i class="pi pi-file-excel text-base text-[#2f7d4a]"></i>
            Export Excel
        </button>
    </div>
    }
</div>
