<header class="flex h-[88px] w-full items-center justify-between border-b border-[#e5ded2] bg-[#f8f7f5] px-7 lg:px-8">
  <div class="flex min-w-0 items-center gap-7">
    <p class="whitespace-nowrap text-sm font-medium text-[#8d877e]">
      {{ dateLabel }}
    </p>

    <label
      class="topbar-search flex h-11 w-[210px] items-center gap-3 rounded-full border border-[#e5ded2] bg-[#f1eee8] px-4 text-[#9b948a] transition duration-200 focus-within:border-[#cfc5b8] focus-within:bg-white focus-within:shadow-sm"
      aria-label="Search"
    >
      <i class="pi pi-search text-sm"></i>
      <input
        type="search"
        placeholder="Search..."
        class="min-w-0 flex-1 bg-transparent text-sm font-medium text-[#544e46] outline-none placeholder:text-[#a8a096]"
      />
      <span class="rounded-full bg-[#e4ded4] px-2 py-1 text-[11px] font-semibold leading-none text-[#8a8176]">
        ⌘K
      </span>
    </label>
  </div>

  <div class="flex items-center gap-5">
    <button
      type="button"
      class="relative flex h-11 w-11 items-center justify-center rounded-full text-[#6f675e] transition duration-200 hover:bg-[#efeae2] hover:text-[#37322d]"
      aria-label="Notifications"
    >
      <i class="pi pi-bell text-xl"></i>
      <span
        class="absolute right-2 top-1.5 flex h-5 min-w-5 items-center justify-center rounded-full bg-[#dc3f35] px-1 text-[11px] font-bold leading-none text-white ring-2 ring-[#f8f7f5]"
      >
        {{ notificationCount }}
      </span>
    </button>

    <span class="h-10 w-px bg-[#e5ded2]" aria-hidden="true"></span>

    <app-user-menu [user]="user"></app-user-menu>
  </div>
</header>
